appId: com.tagme.app
productName: Tag Me
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
win:
  executableName: Tag Me
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: douglasio
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
# electron-builder auto-publishes .snap files to the Snap Store by default,
# independent of the top-level `publish` config below — that requires
# snapcraft/store credentials we don't have set up in CI, so disable it here.
# The .snap artifact itself still gets built and uploaded to the GitHub
# Release like the other Linux targets.
snap:
  publish: null
npmRebuild: false
publish:
  provider: github
  owner: douglasio
  repo: photo-tag-manager-tool
  releaseType: release
