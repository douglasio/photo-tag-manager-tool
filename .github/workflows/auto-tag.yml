name: Auto Tag

on:
  push:
    branches: [main]
    paths:
      - 'package.json'

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine version and check for existing tag
        id: version
        run: |
          VERSION="v$(node -p "require('./package.json').version")"
          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"
          if git ls-remote --exit-code --tags origin "refs/tags/$VERSION" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # Pushing the tag below already triggers release.yml on its own
      # (it has `on.push.tags: v*`), so there's no separate step to kick
      # that off — doing so explicitly would fire a second, independent
      # release.yml run for the same tag, racing the first to publish the
      # same-named assets to the same GitHub release.
      - name: Create and push tag
        if: steps.version.outputs.exists == 'false'
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"
